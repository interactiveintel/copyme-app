name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint, type-check, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Unit tests (phone + ruleof7)
        run: npm run test:all

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          # CI build doesn't need a real DB — Prisma client generation is
          # what `next build` actually exercises.
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

  preview-comment:
    name: Comment Vercel preview URL
    if: github.event_name == 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Note
        run: |
          echo "Vercel handles preview deployments via its GitHub app."
          echo "This job is a placeholder for richer per-PR commentary."
