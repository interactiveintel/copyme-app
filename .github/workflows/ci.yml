name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Provide a placeholder DATABASE_URL at the job level so prisma.config.ts
# (which is loaded by `prisma generate` in the postinstall hook) doesn't
# throw before npm ci finishes. The real production DB lives in Vercel's
# env config; CI only needs Prisma to generate the client, not connect.
env:
  DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
  DATABASE_URL_UNPOOLED: postgresql://ci:ci@localhost:5432/ci
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  build:
    name: Lint, type-check, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint
        continue-on-error: true

      # Type-check is informational while pre-existing TS errors in
      # DemoModal/push/use-web-push/yogi/next.config get cleaned up.
      # CI gate will tighten once those land.
      - name: Type-check (informational)
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Unit tests (phone + ruleof7)
        run: npm run test:all

      - name: Build
        run: npm run build

  preview-comment:
    name: Comment Vercel preview URL
    if: github.event_name == 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Note
        run: |
          echo "Vercel handles preview deployments via its GitHub app."
          echo "This job is a placeholder for richer per-PR commentary."
