name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: postgresql://ci:ci@localhost:5432/copyme_ci
  DATABASE_URL_UNPOOLED: postgresql://ci:ci@localhost:5432/copyme_ci
  NEXT_TELEMETRY_DISABLED: "1"
  # Placeholder JWT_SECRET (≥32 chars) for lib/auth module-load.
  JWT_SECRET: ci-secret-32-chars-not-for-production-use-x

jobs:
  build:
    name: Lint, type-check, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Static pages call Prisma at build time; we need a real-enough Postgres
    # to apply migrations and respond to queries with empty results.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: copyme_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations to CI Postgres
        run: npx prisma migrate deploy

      # A4: lint + typecheck hard-gate. Generated dirs ignored via eslint.config.mjs.
      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Unit tests (phone + ruleof7)
        run: npm run test:all

      - name: Build
        run: npm run build

  preview-comment:
    name: Comment Vercel preview URL
    if: github.event_name == 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Note
        run: |
          echo "Vercel handles preview deployments via its GitHub app."
          echo "This job is a placeholder for richer per-PR commentary."
